<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS 3.0 究極完全體</title>

    <style>
        :root { 
            --bg: #020617; 
            --card: #0f172a; 
            --accent: #38bdf8; 
            --green: #10b981; 
        }
        body {
            font-family: system-ui;
            background: var(--bg);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 30px;
            max-width: 440px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e293b;
        }
        
        #connectBtn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }
        #connectBtn:active { background: #1d4ed8; }

        #log {
            background: #0005;
            padding: 15px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>

<body>
    <div class="card" id="touchArea">
        <h2> ARGUS 3.0 </h2>
        
        <button id="connectBtn">🔗 點此連接超音波導盲杖</button>
        <div id="statusTxt">系統啟動中...</div>

        <div style="height: 260px; background: #000; border-radius: 20px; margin: 15px 0; overflow: hidden;">
            <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>

        <div id="log">等待指令...<br><small>(支援手勢盲操作)</small></div>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        // API KEY 初始化
        let KEY = localStorage.getItem("argus_api_key");
        if (!KEY) {
            KEY = prompt("請輸入 Gemini API Key：");
            if (KEY) localStorage.setItem("argus_api_key", KEY);
        }

        // 連點 10 下清除金鑰
        let resetCounter = 0;
        document.body.addEventListener('click', (e) => {
            if (e.target.id === 'connectBtn') return; 
            resetCounter++;
            if (resetCounter === 10) {
                localStorage.removeItem("argus_api_key");
                alert("金鑰已清除");
                location.reload();
            }
            setTimeout(() => { resetCounter = 0; }, 3000);
        });

        const MODEL = "gemini-2.0-flash";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const log = document.getElementById("log");
        const statusTxt = document.getElementById("statusTxt");
        const connectBtn = document.getElementById("connectBtn");

        let currentStream = null;
        let pressTimer;
        let isLongPress = false;
        let isProcessing = false;
        let clickCount = 0;
        let clickTimer = null;
        let speechQueue = [];
        let speaking = false;
        let hasPlayedIntro = false; 

        // 語音核心
        function speak(text, rate = 1.05) {
            speechQueue.push({text, rate});
            processSpeech();
        }

        function processSpeech() {
            if (speaking || speechQueue.length === 0) return;
            speaking = true;
            const item = speechQueue.shift();
            const u = new SpeechSynthesisUtterance(item.text);
            u.lang = "zh-TW";
            u.rate = item.rate;
            u.onend = () => { speaking = false; processSpeech(); };
            window.speechSynthesis.speak(u);
        }

        function stopSpeech() {
            window.speechSynthesis.cancel();
            speechQueue = [];
            speaking = false;
        }

        function introGuide() {
            speak("系統已啟動。");
            speak("請點擊最上方按鈕連接導盲杖。");
            speak("或單擊畫面辨識號誌。");
        }

        // 相機啟動
        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                currentStream = stream;
                statusTxt.innerText = "● 軟體系統就緒";
                if (!hasPlayedIntro) {
                    setTimeout(introGuide, 800);
                    hasPlayedIntro = true; 
                }
            } catch (err) {
                statusTxt.innerText = "❌ 相機啟動失敗";
            }
        }
        startCamera();
        // 藍牙與感測器監聽
        connectBtn.addEventListener('click', async (e) => {
            e.stopPropagation(); 
            try {
                statusTxt.innerText = " 正在搜尋導盲杖...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ARGUS_Dynamic_V3' }],
                    optionalServices: ['12345678-1234-5678-1234-56789abcdef0']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('12345678-1234-5678-1234-56789abcdef0');
                const char = await service.getCharacteristic('abcdef01-1234-5678-1234-56789abcdef0');

                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const msg = new TextDecoder().decode(event.target.value);
                    if (msg === "WARNING") {
                        // 感測器擁有最高優先權，強制解除 isProcessing 進行辨識
                        isProcessing = false; 
                        analyze(true); 
                    }
                });

                statusTxt.innerHTML = "🟢 <span style='color:var(--green);'>硬體防護已連線</span>";
                connectBtn.innerText = "✅ 導盲杖已連接";
                connectBtn.style.background = "#10b981";
                speak("導盲杖連接成功");
            } catch (err) { 
                statusTxt.innerText = "🔴 連線失敗"; 
            }
        });

        // 影像解析邏輯
        async function analyze(isEmergency = false) {
            if (isProcessing || !KEY) return;
            if (video.videoWidth === 0) return;

            stopSpeech(); // 每次辨識前強行切斷舊語音，避免重疊
            isProcessing = true;
            
            if (isEmergency) {
                log.innerHTML = "🚨 <span style='color:red;'>警告：偵測到障礙物</span>";
                speak("警告，偵測到障礙物", 1.2); 
            } else {
                log.innerHTML = "🧠 正在解析號誌...";
                speak("正在辨識號誌");
            }

            const ctx = canvas.getContext("2d");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL("image/jpeg", 0.6).split(",")[1];

            const promptText = isEmergency 
                ? "緊急狀況：請用10個字以內，告訴我正前方擋住的物體名稱，並給出具體避開建議，不需要說出字數及特殊符號。"
                : "辨識圖中交通資訊，限20字內。1.紅綠燈：顏色與秒數。2.平交道狀況。3.其他重要號誌。";

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}`;

            try {
                const res = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
                    })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "無法辨識";
                log.innerHTML = `<span class="highlight">${text}</span>`;
                speak(text, isEmergency ? 1.2 : 1.05); 
            } catch {
                speak(isEmergency ? "前方危險，請立即停下" : "辨識失敗");
            }
            
            // 冷卻時間設定：3 秒
            setTimeout(() => { isProcessing = false; }, 3000);
        }

        // 手勢偵測（含隱藏長按 1 秒）
        document.body.addEventListener("pointerdown", (e) => {
            if (e.target.id === 'connectBtn') return; 
            isLongPress = false; 
            if (!log.contains(e.target)) {
                // 長按 1000 毫秒 (1秒) 觸發手動補位
                pressTimer = setTimeout(() => {
                    isLongPress = true;
                    analyze(true);
                }, 1000);
            }
        });

        document.body.addEventListener("pointerup", (e) => {
            if (e.target.id === 'connectBtn') return; 
            clearTimeout(pressTimer); 
            if (!isLongPress && log.contains(e.target)) {
                clickCount++;
                clearTimeout(clickTimer); 
                clickTimer = setTimeout(() => {
                    if (clickCount === 1) analyze(false);
                    clickCount = 0; 
                }, 300); 
            }
        });

        document.body.addEventListener("pointercancel", () => clearTimeout(pressTimer));
    </script>
</body>
</html>
