<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS 3.0 究極完全體</title>

    <style>
        :root { 
            --bg: #020617; 
            --card: #0f172a; 
            --accent: #38bdf8; 
            --green: #10b981; 
        }
        body {
            font-family: system-ui;
            background: var(--bg);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 30px;
            max-width: 440px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e293b;
        }
        
        /* 藍牙連線按鈕專屬樣式 */
        #connectBtn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }
        #connectBtn:active { background: #1d4ed8; }

        #log {
            background: #0005;
            padding: 15px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .highlight { color: #fff; font-weight: bold; }
        .shop-item { padding: 6px 0; border-bottom: 1px solid #1e293b; }
    </style>
</head>

<body>
    <div class="card" id="touchArea">
        <h2>👁 ARGUS 3.0 完全體</h2>
        
        <button id="connectBtn">🔗 點此連接超音波導盲杖</button>
        <div id="statusTxt">系統啟動中...</div>

        <div style="height: 260px; background: #000; border-radius: 20px; margin: 15px 0; overflow: hidden;">
            <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>

        <div id="log">等待指令...<br><small>(支援手勢盲操作)</small></div>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        /* === 核心修正：API KEY 隱私輸入機制 === */
        let KEY = localStorage.getItem("argus_api_key");
        if (!KEY) {
            KEY = prompt("為了防止 GitHub 警報，請輸入您的 Gemini API Key：");
            if (KEY) localStorage.setItem("argus_api_key", KEY);
        }

        // 隱藏重設功能：快速連點畫面 10 下可清除金鑰
        let resetCounter = 0;
        document.body.addEventListener('click', (e) => {
            if (e.target.id === 'connectBtn') return; 
            resetCounter++;
            if (resetCounter === 10) {
                localStorage.removeItem("argus_api_key");
                alert("金鑰已清除，請重新整理網頁後輸入新金鑰。");
                location.reload();
            }
            setTimeout(() => { resetCounter = 0; }, 3000);
        });

        const MODEL = "gemini-2.5-flash";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const log = document.getElementById("log");
        const statusTxt = document.getElementById("statusTxt");
        const connectBtn = document.getElementById("connectBtn");

        let currentFacingMode = "environment";
        let currentStream = null;
        let autoInterval = null;
        let pressTimer;
        let isLongPress = false;
        let isProcessing = false;
        let clickCount = 0;
        let clickTimer = null;
        let speechQueue = [];
        let speaking = false;
        let hasPlayedIntro = false; 

        /* ================= 語音系統 ================= */
        function speak(text, rate = 1.05) {
            speechQueue.push({text, rate});
            processSpeech();
        }

        function processSpeech() {
            if (speaking || speechQueue.length === 0) return;
            speaking = true;
            
            const item = speechQueue.shift();
            const u = new SpeechSynthesisUtterance(item.text);
            u.lang = "zh-TW";
            u.rate = item.rate;
            u.onend = () => { speaking = false; processSpeech(); };
            window.speechSynthesis.speak(u);
        }

        function stopSpeech() {
            window.speechSynthesis.cancel();
            speechQueue = [];
            speaking = false;
        }

        function introGuide() {
            speak("系統已啟動。");
            speak("請點擊最上方按鈕連接導盲杖。");
            speak("或單擊畫面辨識前方物體，長按兩秒掃描附近店家。");
        }

        /* ================= 相機 (自動降落傘) ================= */
        async function startCamera(mode) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                video.srcObject = stream;
                currentStream = stream;
                video.style.transform = mode === "user" ? "scaleX(-1)" : "scaleX(1)";
                statusTxt.innerText = "● 軟體系統就緒";
                
                if (!hasPlayedIntro) {
                    setTimeout(introGuide, 800);
                    hasPlayedIntro = true; 
                }
            } catch (err) {
                if (mode === "environment") {
                    console.log("切換為前鏡頭");
                    currentFacingMode = "user";
                    startCamera("user"); 
                } else {
                    log.innerHTML = "❌ 無法存取相機";
                }
            }
        }
        startCamera(currentFacingMode);

        function switchCamera() {
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
            startCamera(currentFacingMode);
            stopSpeech();
            speak("已切換鏡頭");
        }
        /* ================= 藍牙連線：ESP32 硬體防護 ================= */
        connectBtn.addEventListener('click', async (e) => {
            e.stopPropagation(); 
            
            try {
                statusTxt.innerText = "🔍 正在搜尋導盲杖...";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ARGUS_Device' }],
                    optionalServices: ['12345678-1234-5678-1234-56789abcdef0']
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('12345678-1234-5678-1234-56789abcdef0');
                const char = await service.getCharacteristic('abcdef01-1234-5678-1234-56789abcdef0');

                await char.startNotifications();
                
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const msg = new TextDecoder().decode(event.target.value);
                    if (msg === "WARNING" && !isProcessing) {
                        analyze(true); 
                    }
                });

                statusTxt.innerHTML = "🟢 <span style='color:var(--green);'>硬體防護已連線</span>";
                connectBtn.innerText = "✅ 導盲杖已連接";
                connectBtn.style.background = "#10b981";
                speak("導盲杖連接成功，全面防護啟動");
            } catch (err) { 
                statusTxt.innerText = "🔴 連線失敗，請重試"; 
            }
        });

        /* ================= 影像辨識 (修正必要語法) ================= */
        async function analyze(isEmergency = false) {
            if (isProcessing || !KEY) return;
            if (video.videoWidth === 0) { speak("相機準備中"); return; }

            stopSpeech();
            isProcessing = true;
            
            if (isEmergency) {
                log.innerHTML = "🚨 <span style='color:red;'>硬體警告！</span> 正在分析威脅...";
                speak("警告，偵測到障礙物", 1.2); 
            } else {
                log.innerHTML = "🧠 正在解析影像...";
                speak("正在分析");
            }

            const ctx = canvas.getContext("2d");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL("image/jpeg", 0.8).split(",")[1];

            const promptText = isEmergency 
                ? "緊急狀況：請用10個字以內，告訴我正前方逼近的物體是什麼？並給出簡短避開建議。"
                : "請用10字內描述前方最重要物體方位";

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}`;

            try {
                const res = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                });
                
                if (!res.ok) throw new Error("API 錯誤");

                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "無法辨識";
                log.innerHTML = `<span class="highlight">${text}</span>`;
                
                speak(text, isEmergency ? 1.2 : 1.05); 
            } catch {
                log.innerHTML = "❌ 辨識失敗";
                speak(isEmergency ? "前方危險，請立即停下" : "辨識失敗");
            }
            
            setTimeout(() => { isProcessing = false; }, isEmergency ? 4000 : 2000);
}
        /* ================= 店家掃描 (長按觸發) ================= */
        async function locate() {
            if (isProcessing) return;
            stopSpeech();
            isProcessing = true;
            log.innerHTML = "🛰️ 正在掃描周邊...";
            speak("正在定位周邊設施");

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                try {
                    const query = `[out:json];(node(around:200,${lat},${lon})["name"]["shop"];node(around:200,${lat},${lon})["name"]["amenity"];);out;`;
                    const osmRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                    const osmJson = await osmRes.json();

                    if (!osmJson.elements.length) {
                        speak("附近沒有店家"); log.innerHTML = "附近沒有店家";
                        isProcessing = false; return;
                    }

                    let names = [];
                    let html = "";
                    osmJson.elements.forEach(e => {
                        const name = e.tags.name;
                        if (name && !names.includes(name)) {
                            names.push(name);
                            html += `<div class="shop-item">${name}</div>`;
                        }
                    });
                    log.innerHTML = html;

                    speak(`附近共有${names.length}間設施`);
                    names.forEach(n => speak(n));

                } catch { log.innerHTML = "❌ 掃描失敗"; speak("掃描失敗"); }
                isProcessing = false;
            });
        }

        /* ================= 全螢幕盲操作手勢 ================= */
        document.body.addEventListener("pointerdown", (e) => {
            if (e.target.id === 'connectBtn') return; 
            
            isLongPress = false; 
            pressTimer = setTimeout(() => {
                isLongPress = true; 
                locate();
            }, 1500); 
        });

        document.body.addEventListener("pointerup", (e) => {
            if (e.target.id === 'connectBtn') return; 
            
            clearTimeout(pressTimer); 
            if (isLongPress) return; 

            clickCount++;
            clearTimeout(clickTimer); 

            clickTimer = setTimeout(() => {
                if (clickCount === 1) analyze(false);      // 單擊：一般探索
                else if (clickCount === 2) switchCamera(); // 雙擊：切換鏡頭
                else if (clickCount >= 3) {                // 三擊：自動巡航
                    if (autoInterval) {
                        clearInterval(autoInterval); autoInterval = null;
                        speak("自動辨識已關閉"); log.innerHTML = "自動辨識：關閉";
                    } else {
                        autoInterval = setInterval(() => analyze(false), 15000);
                        speak("自動辨識已開啟"); log.innerHTML = "自動辨識：開啟";
                        analyze(false); 
                    }
                }
                clickCount = 0; 
            }, 350); 
        });
    </script>
</body>
</html>
