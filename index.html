<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS 3.0 究極完全體</title>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --green: #10b981; }
        body { font-family: system-ui; background: var(--bg); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; max-width: 440px; width: 92%; text-align: center; border: 1px solid #1e293b; }
        #connectBtn { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #log { background: #0005; padding: 15px; border-radius: 15px; max-height: 200px; overflow-y: auto; margin-top: 15px; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="touchArea">
        <h2>👁 ARGUS 3.0 完全體</h2>
        <button id="connectBtn">🔗 點此連接超音波導盲杖</button>
        <div id="statusTxt">系統啟動中...</div>
        <div style="height: 260px; background: #000; border-radius: 20px; margin: 15px 0; overflow: hidden;">
            <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>
        <div id="log">等待指令...</div>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        /* === 智慧記憶金鑰系統 === */
        let KEY = localStorage.getItem("argus_api_key");
        if (!KEY) {
            KEY = prompt("為了保護隱私，請輸入您的 Gemini API Key：\n(輸入後會自動記住，不會公開在網路上)");
            if (KEY) localStorage.setItem("argus_api_key", KEY);
        }

        let resetCounter = 0;
        document.body.addEventListener('click', () => {
            resetCounter++;
            if (resetCounter === 10) {
                localStorage.removeItem("argus_api_key");
                alert("金鑰已清除，重新整理後可重設。");
                location.reload();
            }
            setTimeout(() => { resetCounter = 0; }, 3000); 
        });

        const MODEL = "gemini-1.5-flash"; 
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const log = document.getElementById("log");
        const statusTxt = document.getElementById("statusTxt");
        const connectBtn = document.getElementById("connectBtn");

        let currentStream = null;
        let isProcessing = false;
        let speechQueue = [];
        let speaking = false;

        function speak(text, rate = 1.05) {
            speechQueue.push({text, rate});
            processSpeech();
        }

        function processSpeech() {
            if (speaking || speechQueue.length === 0) return;
            speaking = true;
            const item = speechQueue.shift();
            const u = new SpeechSynthesisUtterance(item.text);
            u.lang = "zh-TW";
            u.rate = item.rate;
            u.onend = () => { speaking = false; processSpeech(); };
            window.speechSynthesis.speak(u);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                statusTxt.innerText = "● 系統就緒";
            } catch (err) { log.innerHTML = "❌ 相機啟動失敗"; }
        }
        startCamera();

        async function analyze() {
            if (isProcessing || !KEY) return;
            isProcessing = true;
            log.innerHTML = "🧠 正在分析...";
            const ctx = canvas.getContext("2d");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL("image/jpeg", 0.8).split(",")[1];

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "描述前方物體" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "辨識中";
                log.innerHTML = `<span class="highlight">${text}</span>`;
                speak(text);
            } catch { log.innerHTML = "❌ 失敗"; }
            setTimeout(() => { isProcessing = false; }, 2000);
        }

        document.body.addEventListener("pointerup", (e) => {
            if (e.target.id === 'connectBtn') return;
            analyze();
        });
    </script>
</body>
</html>
