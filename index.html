<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS 3.0 究極完全體</title>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --green: #10b981; }
        body {
            font-family: system-ui; background: var(--bg); color: #f8fafc;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            touch-action: none; user-select: none;
        }
        .card {
            background: var(--card); padding: 25px; border-radius: 30px;
            max-width: 440px; width: 92%; text-align: center; border: 1px solid #1e293b;
        }
        #connectBtn {
            background: #2563eb; color: white; border: none; padding: 12px 20px;
            border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%;
            margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative; z-index: 10;
        }
        #connectBtn:active { background: #1d4ed8; }
        #log {
            background: #0005; padding: 15px; border-radius: 15px;
            max-height: 200px; overflow-y: auto; margin-top: 15px;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="touchArea">
        <h2>👁 ARGUS 3.0 完全體</h2>
        <button id="connectBtn">🔗 點此連接超音波導盲杖</button>
        <div id="statusTxt">系統啟動中...</div>
        <div style="height: 260px; background: #000; border-radius: 20px; margin: 15px 0; overflow: hidden;">
            <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>
        <div id="log">等待指令...<br><small>(支援手勢盲操作)</small></div>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        let KEY = localStorage.getItem("argus_api_key");
        if (!KEY) {
            KEY = prompt("為了防止 GitHub 警報，請輸入您的 Gemini API Key：");
            if (KEY) localStorage.setItem("argus_api_key", KEY);
        }

        let resetCounter = 0;
        document.body.addEventListener('click', (e) => {
            if (e.target.id === 'connectBtn') return; 
            resetCounter++;
            if (resetCounter === 10) {
                localStorage.removeItem("argus_api_key");
                alert("金鑰已清除，請重新整理網頁。");
                location.reload();
            }
            setTimeout(() => { resetCounter = 0; }, 3000);
        });

        const MODEL = "gemini-2.0-flash"; // 修正為目前穩定的 Flash 版本
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const log = document.getElementById("log");
        const statusTxt = document.getElementById("statusTxt");
        const connectBtn = document.getElementById("connectBtn");

        let currentFacingMode = "environment";
        let currentStream = null;
        let pressTimer;
        let isLongPress = false;
        let isProcessing = false;
        let clickCount = 0;
        let clickTimer = null;
        let speechQueue = [];
        let speaking = false;
        let hasPlayedIntro = false;

        function speak(text, rate = 1.05) {
            speechQueue.push({text, rate});
            processSpeech();
        }

        function processSpeech() {
            if (speaking || speechQueue.length === 0) return;
            speaking = true;
            const item = speechQueue.shift();
            const u = new SpeechSynthesisUtterance(item.text);
            u.lang = "zh-TW"; u.rate = item.rate;
            u.onend = () => { speaking = false; processSpeech(); };
            window.speechSynthesis.speak(u);
        }

        function stopSpeech() {
            window.speechSynthesis.cancel();
            speechQueue = [];
            speaking = false;
        }

        async function startCamera(mode) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: mode }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
                currentStream = stream;
                statusTxt.innerText = "● 軟體系統就緒";
                if (!hasPlayedIntro) {
                    setTimeout(() => speak("系統已啟動。點擊按鈕連接導盲杖，或單擊畫面辨識號誌。"), 800);
                    hasPlayedIntro = true;
                }
            } catch (err) {
                if (mode === "environment") startCamera("user");
                else log.innerHTML = "❌ 無法存取相機";
            }
        }
        startCamera(currentFacingMode);

        connectBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            try {
                statusTxt.innerText = "🔍 正在搜尋導盲杖...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ARGUS_Dynamic_V3' }],
                    optionalServices: ['12345678-1234-5678-1234-56789abcdef0']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('12345678-1234-5678-1234-56789abcdef0');
                const char = await service.getCharacteristic('abcdef01-1234-5678-1234-56789abcdef0');
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const msg = new TextDecoder().decode(event.target.value);
                    if (msg === "WARNING" && !isProcessing) analyze(true);
                });
                statusTxt.innerHTML = "🟢 <span style='color:var(--green);'>硬體防護已連線</span>";
                connectBtn.innerText = "✅ 導盲杖已連接";
                connectBtn.style.background = "#10b981";
                speak("導盲杖連接成功");
            } catch (err) { statusTxt.innerText = "🔴 連線失敗"; }
        });

        // 核心優化：單次擷取與壓縮
        function captureBase64() {
            const ctx = canvas.getContext("2d", { alpha: false });
            const targetWidth = 480; 
            const scale = targetWidth / video.videoWidth;
            canvas.width = targetWidth;
            canvas.height = Math.round(video.videoHeight * scale);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL("image/jpeg", 0.6).split(",")[1];
        }

        async function analyze(isEmergency = false) {
            if (isProcessing || !KEY || video.videoWidth === 0) return;
            
            stopSpeech();
            isProcessing = true;
            log.innerHTML = isEmergency ? "🚨 <span style='color:red;'>警告：障礙物</span>" : "🧠 正在解析...";
            speak(isEmergency ? "警告，偵測到障礙物" : "正在辨識");

            const base64 = captureBase64();
            const promptText = isEmergency 
                ? "緊急：10字內報出正前方障礙物並給避開建議。" 
                : "限20字內：1.紅綠燈顏色與秒數。2.平交道有無火車。3.其他重要號誌名稱。";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                        generationConfig: { temperature: 0, maxOutputTokens: 40 }
                    })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "辨識失敗";
                log.innerHTML = `<span class="highlight">${text}</span>`;
                speak(text, isEmergency ? 1.2 : 1.05);
            } catch {
                log.innerHTML = "❌ 錯誤";
            } finally {
                setTimeout(() => { isProcessing = false; }, 2000);
            }
        }

        document.body.addEventListener("pointerdown", (e) => {
            if (e.target.id === 'connectBtn') return;
            isLongPress = false;
            if (!log.contains(e.target)) {
                pressTimer = setTimeout(() => {
                    isLongPress = true;
                    analyze(true);
                }, 750);
            }
        });

        document.body.addEventListener("pointerup", (e) => {
            if (e.target.id === 'connectBtn') return;
            clearTimeout(pressTimer);
            if (!isLongPress && log.contains(e.target)) {
                clickCount++;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    if (clickCount === 1) analyze(false);
                    clickCount = 0;
                }, 300);
            }
        });
    </script>
</body>
</html>
